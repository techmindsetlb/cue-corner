<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Café Menu</title>
  <meta name="description" content="Our full menu — crafted with care." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --ease-out-quint:    cubic-bezier(.23,1,.32,1);
      --ease-in-out-cubic: cubic-bezier(.645,.045,.355,1);
      --ease-spring:       cubic-bezier(.34,1.56,.64,1);

      --c-bg:           #0e0b08;
      --c-surface:      #161210;
      --c-surface-2:    #1e1a16;
      --c-border:       rgba(255,240,210,0.07);
      --c-border-hover: rgba(255,240,210,0.16);
      --c-gold:         #c9a96e;
      --c-gold-light:   #e8c98a;
      --c-gold-dim:     rgba(201,169,110,0.14);
      --c-text:         #f0e8d8;
      --c-text-muted:   #8a7d6a;
      --c-text-dim:     #5a5048;

      --text-xs:   clamp(0.70rem, 0.65rem + 0.25vw, 0.80rem);
      --text-sm:   clamp(0.82rem, 0.78rem + 0.20vw, 0.90rem);
      --text-base: clamp(0.95rem, 0.90rem + 0.25vw, 1.05rem);
      --text-lg:   clamp(1.10rem, 1.00rem + 0.50vw, 1.30rem);
      --text-xl:   clamp(1.30rem, 1.10rem + 1.00vw, 1.80rem);
      --text-2xl:  clamp(1.70rem, 1.30rem + 2.00vw, 2.80rem);
      --text-hero: clamp(2.50rem, 2.00rem + 3.00vw, 5.00rem);

      --space-xs: clamp(0.30rem,.25rem + .25vw,.50rem);
      --space-sm: clamp(0.60rem,.50rem + .50vw,.90rem);
      --space-md: clamp(1.00rem,.80rem + 1.0vw,1.60rem);
      --space-lg: clamp(1.60rem,1.20rem + 2.0vw,2.80rem);
      --space-xl: clamp(2.50rem,2.00rem + 2.5vw,4.50rem);

      --radius:    4px;
      --radius-md: 8px;
      --radius-lg: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-base);
      line-height: 1.65;
      overflow-x: hidden;
      min-height: 100dvh;
    }

    img { max-width: 100%; height: auto; display: block; }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.35;
    }

    /* ===== LOADING ===== */
    #loadingScreen {
      position: fixed; inset: 0;
      background: var(--c-bg);
      z-index: 1000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.25rem;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #loadingScreen.hidden { opacity: 0; visibility: hidden; }
    .loading-ring {
      width: 44px; height: 44px;
      border: 1px solid var(--c-border);
      border-top-color: var(--c-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: var(--text-lg);
      color: var(--c-text-muted);
    }

    /* ===== ERROR BANNER ===== */
    #errorBanner {
      display: none;
      background: rgba(192,57,43,0.12);
      border: 1px solid rgba(192,57,43,0.3);
      color: #e08070;
      padding: var(--space-md);
      text-align: center;
      font-size: var(--text-sm);
    }
    #errorBanner.show { display: block; }

    /* ===== HERO ===== */
    .site-header {
      position: relative; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: var(--space-xl) var(--space-md);
      overflow: hidden;
    }

    .header-bg {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(123,63,46,.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(201,169,110,.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 70%, rgba(201,169,110,.04) 0%, transparent 50%);
    }

    .header-lines {
      position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,240,210,.025) 60px);
    }

    .logo-wrap {
      position: relative; margin-bottom: var(--space-lg);
      animation: fadeInDown .9s var(--ease-out-quint) both;
    }

    .cafe-logo {
      width: clamp(80px,15vw,140px); height: clamp(80px,15vw,140px);
      border-radius: 50%; border: 1px solid var(--c-border-hover);
      object-fit: cover; margin: 0 auto;
    }

    #logoFallback {
      width: clamp(80px,15vw,140px); height: clamp(80px,15vw,140px);
      border-radius: 50%; border: 1px solid var(--c-border-hover);
      background: var(--c-surface-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto;
    }

    .logo-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      border: 1px solid rgba(201,169,110,.2);
      animation: spinSlow 20s linear infinite;
    }
    .logo-ring::after {
      content: ''; position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 6px; height: 6px;
      background: var(--c-gold); border-radius: 50%;
    }

    .cafe-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--text-hero); font-weight: 300;
      letter-spacing: .04em; line-height: 1.1;
      animation: fadeInUp .9s var(--ease-out-quint) .1s both;
    }
    .cafe-name em { font-style: italic; color: var(--c-gold); }

    .cafe-tagline {
      margin-top: var(--space-sm);
      font-size: var(--text-sm); letter-spacing: .2em;
      text-transform: uppercase; color: var(--c-text-muted);
      animation: fadeInUp .9s var(--ease-out-quint) .2s both;
    }

    .divider-ornament {
      display: flex; align-items: center; gap: 1rem;
      margin: var(--space-lg) auto; width: min(280px,60vw);
      animation: fadeIn 1s var(--ease-out-quint) .4s both;
    }
    .divider-ornament::before, .divider-ornament::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg,transparent,var(--c-gold-dim),transparent);
    }
    .divider-ornament span { color: var(--c-gold); font-size: 1.1rem; }

    .scroll-hint {
      position: absolute; bottom: var(--space-lg); left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      color: var(--c-text-dim); font-size: var(--text-xs);
      letter-spacing: .15em; text-transform: uppercase;
      animation: fadeIn 1s var(--ease-out-quint) 1s both;
    }
    .scroll-arrow {
      width: 22px; height: 22px;
      border-right: 1px solid var(--c-text-dim);
      border-bottom: 1px solid var(--c-text-dim);
      transform: rotate(45deg);
      animation: bounceDown 2s ease-in-out infinite;
    }

    /* ===== CATEGORY NAV ===== */
    .cat-nav-wrap {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,11,8,.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--c-border);
      padding: 0 var(--space-md);
    }

    .cat-nav {
      max-width: 1200px; margin: 0 auto;
      display: flex; overflow-x: auto; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .cat-nav::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0; padding: var(--space-sm) var(--space-md);
      background: none; border: none;
      color: var(--c-text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: var(--text-xs); letter-spacing: .15em;
      text-transform: uppercase; cursor: pointer;
      position: relative; transition: color 200ms ease; white-space: nowrap;
    }
    .cat-btn::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--c-gold);
      transform: scaleX(0); transform-origin: left;
      transition: transform 250ms var(--ease-out-quint);
    }
    .cat-btn:hover { color: var(--c-text); }
    .cat-btn.active { color: var(--c-gold); }
    .cat-btn.active::after { transform: scaleX(1); }

    /* ===== MAIN ===== */
    .menu-main { max-width: 1200px; margin: 0 auto; padding: var(--space-xl) var(--space-md); }

    .category-section {
      margin-bottom: var(--space-xl);
      opacity: 0; transform: translateY(28px);
      transition: opacity .6s var(--ease-out-quint), transform .6s var(--ease-out-quint);
    }
    .category-section.visible { opacity: 1; transform: translateY(0); }

    .category-header {
      display: flex; align-items: center; gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }
    .category-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--text-2xl); font-weight: 300; font-style: italic;
      white-space: nowrap;
    }
    .category-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--c-border-hover), transparent);
    }

    /* ===== GRID ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(280px,100%), 1fr));
      gap: var(--space-md);
    }

    /* ===== CARD ===== */
    .menu-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      overflow: hidden; position: relative;
      cursor: pointer;
      transition: transform 250ms var(--ease-out-quint),
                  border-color 250ms ease,
                  box-shadow 250ms var(--ease-out-quint);
      container-type: inline-size;
    }
    .menu-card:hover {
      transform: translateY(-5px);
      border-color: var(--c-border-hover);
      box-shadow: 0 18px 44px rgba(0,0,0,.45), 0 0 0 1px rgba(201,169,110,.07);
    }
    .menu-card:focus-visible {
      outline: 2px solid var(--c-gold); outline-offset: 2px;
    }

    .menu-card::before {
      content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(135deg,transparent 40%,rgba(201,169,110,.05) 100%);
      opacity: 0; transition: opacity 300ms ease;
    }
    .menu-card:hover::before { opacity: 1; }

    .card-image-wrap {
      position: relative; overflow: hidden;
      aspect-ratio: 4/3; background: var(--c-surface-2);
    }
    .card-image {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 400ms var(--ease-out-quint);
    }
    .menu-card:hover .card-image { transform: scale(1.07); }

    .card-no-image {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: var(--c-text-dim);
      background: linear-gradient(135deg,var(--c-surface),var(--c-surface-2));
    }

    .card-badges {
      position: absolute; top: var(--space-sm); left: var(--space-sm);
      display: flex; flex-wrap: wrap; gap: 4px; z-index: 2;
    }
    .badge {
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; letter-spacing: .1em;
      text-transform: uppercase; font-weight: 500;
      backdrop-filter: blur(8px);
    }
    .badge-new     { background: rgba(201,169,110,.92); color: #0e0b08; }
    .badge-popular { background: rgba(123,63,46,.92);   color: #f0e8d8; }
    .badge-veg     { background: rgba(50,120,60,.92);   color: #f0f8f0; }
    .badge-spicy   { background: rgba(180,50,30,.92);   color: #fff;    }

    .card-body { padding: var(--space-md); }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--text-lg); font-weight: 400;
      color: var(--c-text); line-height: 1.3; margin-bottom: var(--space-xs);
    }
    .card-desc {
      font-size: var(--text-sm); color: var(--c-text-muted);
      line-height: 1.5; margin-bottom: var(--space-sm);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: var(--space-xs);
    }
    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--text-xl); font-weight: 600; color: var(--c-gold);
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .card-tag {
      font-size: 10px; padding: 2px 7px;
      border: 1px solid var(--c-border-hover);
      border-radius: 20px; color: var(--c-text-dim);
    }

    /* ===== EMPTY / SKELETON ===== */
    .empty-state {
      text-align: center; padding: var(--space-xl); color: var(--c-text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: var(--space-md); }

    .skeleton {
      background: linear-gradient(90deg, var(--c-surface) 25%, var(--c-surface-2) 50%, var(--c-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    .skeleton-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md); overflow: hidden;
    }
    .skeleton-img  { aspect-ratio: 4/3; }
    .skeleton-body { padding: var(--space-md); display: flex; flex-direction: column; gap: .75rem; }
    .skeleton-line { height: 14px; }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.price { width: 30%; height: 20px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 500;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 200ms ease;
    }
    @media (min-width: 640px) {
      .modal-overlay { align-items: center; padding: var(--space-md); }
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--c-surface);
      border: 1px solid var(--c-border-hover);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%; max-width: 540px; max-height: 90dvh;
      overflow-y: auto;
      transform: translateY(60px);
      transition: transform 300ms var(--ease-out-quint);
    }
    @media (min-width: 640px) {
      .modal { border-radius: var(--radius-lg); transform: translateY(20px) scale(.97); }
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-image { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .modal-image-placeholder {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; background: var(--c-surface-2);
    }
    .modal-content { padding: var(--space-lg); }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-md); gap: var(--space-md); }
    .modal-name { font-family: 'Cormorant Garamond', serif; font-size: var(--text-2xl); font-weight: 400; line-height: 1.2; }
    .modal-close {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--c-border-hover); background: none;
      color: var(--c-text-muted); cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 200ms ease, color 200ms ease;
    }
    .modal-close:hover { background: var(--c-surface-2); color: var(--c-text); }
    .modal-price { font-family: 'Cormorant Garamond', serif; font-size: var(--text-2xl); color: var(--c-gold); font-weight: 600; margin-bottom: var(--space-md); }
    .modal-desc  { color: var(--c-text-muted); line-height: 1.7; margin-bottom: var(--space-md); }
    .modal-details { display: flex; flex-direction: column; gap: var(--space-sm); padding-top: var(--space-md); border-top: 1px solid var(--c-border); }
    .detail-row { display: flex; gap: var(--space-sm); font-size: var(--text-sm); }
    .detail-label { color: var(--c-text-dim); min-width: 90px; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .1em; padding-top: 2px; }
    .detail-value { color: var(--c-text-muted); }

    /* ===== FOOTER ===== */
    .site-footer { border-top: 1px solid var(--c-border); padding: var(--space-xl) var(--space-md); text-align: center; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-logo  { font-family: 'Cormorant Garamond', serif; font-size: var(--text-xl); font-style: italic; color: var(--c-gold); margin-bottom: var(--space-sm); }
    .footer-text  { font-size: var(--text-sm); color: var(--c-text-dim); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn     { from { opacity:0; }                              to { opacity:1; } }
    @keyframes bounceDown { 0%,100% { transform:rotate(45deg) translateY(0);  } 50% { transform:rotate(45deg) translateY(6px); } }
    @keyframes spinSlow   { from { transform:rotate(0deg); }  to { transform:rotate(360deg); } }
    @keyframes spin       { from { transform:rotate(0deg); }  to { transform:rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--c-bg); }
    ::-webkit-scrollbar-thumb { background: var(--c-border-hover); border-radius: 3px; }
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="loading-ring"></div>
  <p class="loading-text">Setting the table…</p>
</div>

<div id="errorBanner">
  ⚠ Could not connect to the menu database. Please check your Supabase configuration in <code>config.js</code>.
</div>

<header class="site-header">
  <div class="header-bg"></div>
  <div class="header-lines"></div>
  <div class="logo-wrap">
    <img id="siteLogo" class="cafe-logo" src="" alt="Café Logo" style="display:none;" />
    <div id="logoFallback">☕</div>
    <div class="logo-ring"></div>
  </div>
  <h1 class="cafe-name" id="cafeName"><em>Café</em></h1>
  <p class="cafe-tagline" id="cafeTagline">— Loading… —</p>
  <div class="divider-ornament"><span>✦</span></div>
  <div class="scroll-hint"><span>Explore Menu</span><div class="scroll-arrow"></div></div>
</header>

<nav class="cat-nav-wrap" aria-label="Menu categories">
  <div class="cat-nav" id="catNav" role="tablist"></div>
</nav>

<main class="menu-main" id="menuMain"></main>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-logo" id="footerName">Café</p>
    <p class="footer-text" id="footerTagline"></p>
  </div>
</footer>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal" id="modalBox">
    <div id="modalImgWrap"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-name" id="modalName"></h2>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <p class="modal-price" id="modalPrice"></p>
      <p class="modal-desc"  id="modalDesc"></p>
      <div class="modal-details" id="modalDetails"></div>
    </div>
  </div>
</div>

<!-- Config (user fills in credentials) -->
<script src="config.js"></script>

<!-- Supabase JS v2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ===== INIT SUPABASE =====
let sb;
try {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
} catch(e) {
  document.getElementById('errorBanner').classList.add('show');
  document.getElementById('loadingScreen').classList.add('hidden');
}

// ===== STATE =====
let categories = [], items = [], settings = {};
let activeCategory = 'all';

// ===== FETCH DATA =====
async function fetchAll() {
  const [catRes, itemRes, setRes] = await Promise.all([
    sb.from('categories').select('*').order('sort_order'),
    sb.from('items').select('*').eq('available', true).order('sort_order'),
    sb.from('settings').select('*')
  ]);

  if (catRes.error || itemRes.error || setRes.error) throw new Error('DB fetch failed');

  categories = catRes.data || [];
  items       = itemRes.data || [];
  settings    = Object.fromEntries((setRes.data || []).map(r => [r.key, r.value]));
}

// ===== APPLY SETTINGS =====
function applySettings() {
  const name    = settings.cafe_name    || 'Café';
  const tagline = settings.cafe_tagline || '';
  const logo    = settings.cafe_logo    || '';
  const footer  = settings.footer_text  || '';

  document.title = name + ' · Menu';
  document.getElementById('cafeName').innerHTML = formatName(name);
  document.getElementById('cafeTagline').textContent = tagline ? '— ' + tagline + ' —' : '';
  document.getElementById('footerName').textContent  = name;
  document.getElementById('footerTagline').textContent = footer;

  const logoEl   = document.getElementById('siteLogo');
  const fallback = document.getElementById('logoFallback');
  if (logo) {
    logoEl.src = logo; logoEl.style.display = 'block';
    fallback.style.display = 'none';
  } else {
    logoEl.style.display = 'none';
    fallback.style.display = 'flex';
  }
}

function formatName(n) {
  const p = n.split(' ');
  return p.length === 1 ? `<em>${n}</em>` : `<em>${p[0]}</em> ${p.slice(1).join(' ')}`;
}

// ===== SKELETON LOADER =====
function showSkeletons() {
  const main = document.getElementById('menuMain');
  main.innerHTML = Array(3).fill(0).map(() => `
    <div style="margin-bottom:3rem;">
      <div class="skeleton" style="height:2rem;width:180px;margin-bottom:2rem;"></div>
      <div class="menu-grid">
        ${Array(3).fill(0).map(() => `
          <div class="skeleton-card">
            <div class="skeleton skeleton-img"></div>
            <div class="skeleton-body">
              <div class="skeleton skeleton-line"></div>
              <div class="skeleton skeleton-line short"></div>
              <div class="skeleton skeleton-line price"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ===== RENDER NAV =====
function renderNav() {
  const nav = document.getElementById('catNav');
  nav.innerHTML = '';

  const allBtn = mkNavBtn('All', 'all');
  nav.appendChild(allBtn);
  categories.forEach(cat => nav.appendChild(mkNavBtn((cat.emoji || '') + ' ' + cat.name, cat.id)));
}

function mkNavBtn(label, id) {
  const b = document.createElement('button');
  b.className  = 'cat-btn' + (activeCategory === id ? ' active' : '');
  b.textContent = label.trim();
  b.setAttribute('role', 'tab');
  b.setAttribute('aria-selected', activeCategory === id);
  b.onclick = () => {
    activeCategory = id;
    renderNav();
    renderMenu();
    if (id !== 'all') {
      const el = document.getElementById('cat-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };
  return b;
}

// ===== RENDER MENU =====
function renderMenu() {
  const main = document.getElementById('menuMain');
  const filteredCats = activeCategory === 'all' ? categories : categories.filter(c => c.id === activeCategory);
  main.innerHTML = '';

  filteredCats.forEach((cat, ci) => {
    const catItems = items.filter(i => i.category_id === cat.id);
    if (!catItems.length) return;

    const sec = document.createElement('section');
    sec.className = 'category-section';
    sec.id = 'cat-' + cat.id;
    sec.setAttribute('aria-label', cat.name);
    sec.style.transitionDelay = (ci * 70) + 'ms';
    sec.innerHTML = `
      <div class="category-header">
        <h2 class="category-title">${(cat.emoji || '') + ' ' + cat.name}</h2>
        <div class="category-line"></div>
      </div>
      <div class="menu-grid"></div>
    `;
    catItems.forEach((item, ii) => sec.querySelector('.menu-grid').appendChild(buildCard(item, ii)));
    main.appendChild(sec);
  });

  if (!main.children.length) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div><p>No items available right now.</p></div>`;
  }

  // Scroll reveal
  requestAnimationFrame(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.06 });
    document.querySelectorAll('.category-section').forEach(el => obs.observe(el));
  });
}

function buildCard(item, idx) {
  const card = document.createElement('article');
  card.className = 'menu-card';
  card.setAttribute('tabindex', '0');
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', `${item.name} – $${item.price}`);
  card.style.animationDelay = (idx * 55) + 'ms';

  const badges   = (item.badges || []).map(b => `<span class="badge badge-${b}">${b}</span>`).join('');
  const tags     = (item.tags   || []).map(t => `<span class="card-tag">${esc(t)}</span>`).join('');
  const imgHTML  = item.image_url
    ? `<img src="${esc(item.image_url)}" alt="${esc(item.name)}" class="card-image" loading="lazy" />`
    : `<div class="card-no-image">${item.emoji || '🍽️'}</div>`;

  card.innerHTML = `
    <div class="card-image-wrap">
      ${imgHTML}
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <h3 class="card-name">${esc(item.name)}</h3>
      <p class="card-desc">${esc(item.description || '')}</p>
      <div class="card-footer">
        <span class="card-price">$${parseFloat(item.price).toFixed(2)}</span>
        <div class="card-tags">${tags}</div>
      </div>
    </div>`;

  const open = () => openModal(item);
  card.addEventListener('click', open);
  card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
  return card;
}

// ===== MODAL =====
function openModal(item) {
  document.getElementById('modalName').textContent  = item.name;
  document.getElementById('modalPrice').textContent = '$' + parseFloat(item.price).toFixed(2);
  document.getElementById('modalDesc').textContent  = item.description || '';

  document.getElementById('modalImgWrap').innerHTML = item.image_url
    ? `<img src="${esc(item.image_url)}" alt="${esc(item.name)}" class="modal-image" />`
    : `<div class="modal-image-placeholder">${item.emoji || '🍽️'}</div>`;

  const det = document.getElementById('modalDetails');
  det.innerHTML = '';
  if (item.calories)  det.innerHTML += detRow('Calories',  item.calories);
  if (item.allergens) det.innerHTML += detRow('Allergens', item.allergens);
  if (item.prep_time) det.innerHTML += detRow('Prep time', item.prep_time);
  if ((item.tags||[]).length) det.innerHTML += detRow('Tags', item.tags.join(', '));

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modalClose').focus();
}

function detRow(l, v) {
  return `<div class="detail-row">
    <span class="detail-label">${esc(l)}</span>
    <span class="detail-value">${esc(v)}</span>
  </div>`;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===== REALTIME SUBSCRIPTION (live updates) =====
function subscribeRealtime() {
  sb.channel('menu-changes')
    .on('postgres_changes', { event: '*', schema: 'public' }, async () => {
      await fetchAll();
      applySettings();
      renderNav();
      renderMenu();
    })
    .subscribe();
}

// ===== UTILS =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// ===== BOOT =====
async function init() {
  if (!sb) return;
  showSkeletons();
  try {
    await fetchAll();
    applySettings();
    renderNav();
    renderMenu();
    subscribeRealtime();
  } catch(err) {
    console.error(err);
    document.getElementById('errorBanner').classList.add('show');
    document.getElementById('menuMain').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Could not load menu.<br>Please check your Supabase credentials in <code>config.js</code>.</p>
      </div>`;
  } finally {
    document.getElementById('loadingScreen').classList.add('hidden');
  }
}

window.addEventListener('load', init);
</script>
